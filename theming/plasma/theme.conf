# ValekOS Plasma Theme - HyperOS3 Inspired
# Theme configuration for KDE Plasma desktop

[Theme]
Name=ValekOS HyperOS3
Name[en_US]=ValekOS HyperOS3
Comment=HyperOS3-inspired theme with glassmorphism and black/blue colors
Comment[en_US]=HyperOS3-inspired theme with glassmorphism and black/blue colors
Version=1.0
Author=ValekOS Team
License=GPL-3.0
Website=https://github.com/valekos/valekos

[Settings]
# Theme details
ActiveColor=#0EA5E9
InactiveColor=#64748B

[General]
# Colors configuration
ColorScheme=ValekOSDark
BlurEnabled=true
TranslucencyEnabled=true
AnimationsEnabled=true
AnimationDurationFactor=0.8

[KDE]
# Widget style
WidgetStyle=Breeze

[Icons]
# Icon theme
Theme=valekos-icons

[Plugins]
# Enabled plugins
blur=true
translucency=true
slide=true
wobblywindows=true
magiclamp=true
dashboard=true
dialogparent=true
dimscreen=true

[Window Effects]
# Window effects for HyperOS3 feel
Glide=1
Scale=1
DimAdminGroup=1
DialogParent=1
Blur=1
Contrast=1

[Panel]
# Panel settings
Translucency=0.85
Blur=true
Contrast=true
