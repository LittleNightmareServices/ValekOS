# ValekOS Calamares Installer Configuration
# Based on standard Calamares settings

# Branding
branding: valekos

# Modules sequence
sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - luksbootkeyfile
    - luksopenswaphookcfg
    - dracutlukscfg
    - plymouthcfg
    - initcpiocfg
    - initcpio
    - users
    - displaymanager
    - networkcfg
    - hwclock
    - services-systemd
    - bootloader
    - postcfg
    - umount
  - show:
    - finished

# Modules search paths
modules-search:
  - local
  - /usr/lib/calamares/modules

# Instances (for repeated modules)
instances:
  - id: unsafe
    module: interactiveterminal
    config: shellprocess.conf

# UI settings
ui:
  # Show or hide the slider on the left
  sidebar: true
  # Show or hide the navigation buttons
  navigation: true

# SLides directory
slideshow: /usr/share/calamares/qml/calamares/slideshow.qml

# Global storage
global-storage:
  # Default filesystem type
  defaultFileSystemType: "ext4"
  # Enable Luks
  enableLuksAutomatedPartitioning: true

# Partition settings
partition:
  # Default partitioning choice
  defaultPartitionChoice: erase
  # Allow manual partitioning
  allowManualPartitioning: true
  # Required partitions
  requiredStorage: 32  # GB

# Package operations
dont-chroot: false
